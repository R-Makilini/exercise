
<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded-xl shadow-lg w-96">

    <h2 class="text-2xl font-bold text-center text-green-600 mb-6">
      Login
    </h2>

    <input id="loginInput" placeholder="Email or Phone number"
      class="w-full p-2 border rounded mb-2">
    <input id="loginPassword" type="password" placeholder="Password"
      class="w-full p-2 border rounded mb-4">

    <button onclick="login()"
      class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">
      Login
    </button>

    <p id="msg" class="text-center mt-3"></p>

  </div>
<script src="./login.js"  ></script>  
</body>
</html>
