
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Student Registration</title>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen py-10">

  <form id="form" action="new.html" class="bg-white w-full max-w-xl rounded-2xl shadow-xl p-8 ">

    <div class="text-center">
      <h1 class="text-3xl font-bold text-purple-700">Student Registration</h1>
    </div>

    <div>
      <label for="fname" class="block mb-2 font-medium text-gray-700">First Name</label>
      <input type="text" id="fname" name="fname" placeholder="Enter your first name"class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500"/>
      <div class="error "></div>
    </div>

    <div>
      <label for="lname" class="block mb-2 font-medium text-gray-700">Last Name</label>
      <input  type="text"  id="lname" name="lname" placeholder="Enter your last name"class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500"/>
      <div class="error"></div>
    </div>

    <div>
      <label for="phonenumber" class="block mb-2 font-medium text-gray-700"> Phone Number </label>
      <input type="tel" id="phonenumber" name="phonenumber"placeholder="Enter your phone number"class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500"/>
      <div class="error"></div>
    </div>

    <div>
      <label for="email" class="block mb-2 font-medium text-gray-700"> Email</label>
      <input type="email"  id="email" name="email"placeholder="Enter your email" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500" />
     <div class="error "></div>
    </div>

    <div>
      <label for="nic" class="block mb-2 font-medium text-gray-700"> NIC Number</label>
      <input type="text"  id="nic" name="nic" placeholder="Enter your NIC number" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500" />
      <div class="error "></div>
    </div>

    <div>
      <label for="pwd" class="block mb-2 font-medium text-gray-700"> Password</label>
      <input type="password" id="pwd" name="pwd" placeholder="Enter password" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500"/>
      <div class="error "></div>
    </div>

    <div>
      <label for="cpwd" class="block mb-2 font-medium text-gray-700">Confirm Password</label>
      <input type="password" id="cpwd" name="cpwd" placeholder="Re-enter password" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500"/>
      <div class="error "></div>
    </div>

    <button type="submit" class="w-full bg-purple-700 hover:bg-purple-800 text-white font-semibold py-3 rounded-lg transition duration-300 mt-3">Register</button>

  </form>

</body>
</html>
