<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Age Verification</title>
</head>

<body class="bg-gradient-to-r from-blue-200 to-purple-300 flex items-center justify-center min-h-screen">
    
  <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">

    <h1 class="text-3xl font-bold text-center text-purple-700 mb-6">
      Age Verification
    </h1>

    <div class="space-y-4">

      <div>
        <label class="block text-gray-700 font-semibold mb-2">
          Enter Your Age
        </label>

        <input 
          type="number" id="age" placeholder="Enter age"
          class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-4 focus:ring-purple-300"
        >
      </div>

      <button 
        onclick="checkAge()"
        class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold hover:bg-purple-700 transition"
      >
        Check Eligibility
      </button>

      <p id="message" class="text-center font-semibold"></p>

    </div>

  </div>

  <script>
    function checkAge() {
    let age = document.getElementById("age").value;

    if(age >= 18){
        window.location.href = "form.html";

      } 
      
      else {

        let remaining = 18 - age;

        localStorage.setItem("remainingYears", remaining);

        window.location.href = "error.html";
      }
    }
  </script>

</body>
</html>
